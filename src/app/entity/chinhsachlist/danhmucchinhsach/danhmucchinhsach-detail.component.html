<form [formGroup]="form" (ngSubmit)="saveChange()" skipValidation>
  <p-panel #pnl header="Chi tiết danh mục chính sách">
    <ng-template pTemplate="body">
      <div class="flex flex-col gap-6 mt-4">

        <!-- Tên -->
        <div>
          <label class="block font-bold mb-2">
            Tên danh mục <span class="text-red-500">*</span>
          </label>
          <input
            pInputText
            formControlName="ten"
            placeholder="Nhập tên danh mục"
            fluid
          />
          <app-validation-message
            [entityForm]="form"
            fieldName="ten"
            [validationMessages]="validationMessages"
          />
        </div>

        <!-- Slug -->
        <div>
          <label class="block font-bold mb-2">
            Slug(tự động tạo hoặc nhập thủ công) <span class="text-red-500">*</span>
          </label>
          <input
            pInputText
            formControlName="slug"
            placeholder="vd: chinh-sach-bao-hanh"
            fluid
          />
        </div>

        <!-- SEO -->
        <div>
          <label class="block font-bold mb-2">Title SEO</label>
          <input pInputText formControlName="titleSEO" fluid />
        </div>

        <div>
          <label class="block font-bold mb-2">Keyword</label>
          <input pInputText formControlName="keyword" fluid />
        </div>

        <div>
          <label class="block font-bold mb-2">Description SEO</label>
          <textarea
            pInputTextarea
            rows="3"
            formControlName="descriptionSEO"
            fluid
          ></textarea>
        </div>

        <!-- Trạng thái -->
        <div class="flex items-center gap-3">
          <label class="font-bold">Trạng thái</label>
          <p-toggleswitch formControlName="trangThai"></p-toggleswitch>
        </div>

      </div>
    </ng-template>

    <!-- Footer -->
    <ng-template pTemplate="footer">
      <p-toolbar>
        <ng-template pTemplate="end">
          <p-button
            label="Hủy"
            icon="pi pi-times"
            severity="secondary"
            [outlined]="true"
            (onClick)="cancel()"
            class="mr-2"
          />
          <p-button
            type="submit"
            label="Lưu lại"
            icon="pi pi-check"
            [disabled]="!form.valid || btnDisabled"
            [loading]="btnDisabled"
          />
        </ng-template>
      </p-toolbar>
    </ng-template>

    <p-blockui [blocked]="blockedPanel" [target]="pnl">
      <p-progressSpinner style="top: 37%;" />
    </p-blockui>
  </p-panel>
</form>

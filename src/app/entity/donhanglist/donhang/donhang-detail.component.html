<form [formGroup]="form" (ngSubmit)="saveChange()">
  <p-panel #pnl header="Chi tiết đơn hàng">

    <div class="flex flex-col gap-6 mt-3">

      <!-- THÔNG TIN KHÁCH HÀNG -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <div class="col-span-1 md:col-span-2">
          <label class="block font-bold mb-2">Khách hàng <span class="text-red-500">*</span></label>
          <p-select
            [options]="khachHangOptions"
            optionLabel="label"
            optionValue="value"
            formControlName="taiKhoanKhachHangId"
            placeholder="Chọn khách hàng"
            (onChange)="onKhachHangChange($event)"
            [filter]="true"
            filterBy="label,email,soDienThoai"
            [showClear]="true"
            fluid>
            <ng-template let-option pTemplate="item">
              <div class="flex flex-col">
                <span class="font-medium">{{option.label}}</span>
                <span class="text-sm text-gray-500">
                  {{option.soDienThoai || '—'}} • {{option.email || '—'}}
                </span>
              </div>
            </ng-template>
          </p-select>
        </div>

        <div>
          <label class="block font-bold mb-2">Tên khách hàng</label>
          <input pInputText formControlName="ten" fluid />
        </div>

        <div>
          <label class="block font-bold mb-2">Số điện thoại</label>
          <input pInputText formControlName="soDienThoai" fluid />
        </div>

        <div>
          <label class="block font-bold mb-2">Email</label>
          <input pInputText formControlName="email" fluid />
        </div>

        <div>
          <label class="block font-bold mb-2">Địa chỉ</label>
          <input pInputText formControlName="diaChi" fluid/>
        </div>

        <div>
          <label class="block font-bold mb-2">Phương thức thanh toán</label>
          <p-select
            formControlName="phuongThucThanhToan"
            [options]="phuongThucThanhToanOptions"
            optionLabel="label"
            optionValue="value"
            placeholder="Chọn phương thức"
            fluid>
          </p-select>
        </div>

        <div>
          <label class="block font-bold mb-2">Ngày đặt</label>
          <p-datepicker
            formControlName="ngayDat"
            dateFormat="dd/mm/yy"
            [showIcon]="true"
            fluid>
          </p-datepicker>
        </div>

      </div>

      <!-- CHI TIẾT SẢN PHẨM -->
      <h3 class="font-bold mt-4">Chi tiết sản phẩm</h3>

      <div formArrayName="chiTietDonHangs">
        <p-table
          [value]="chiTietDonHangs.controls"
          [tableStyle]="{'min-width':'60rem'}">

          <ng-template pTemplate="header">
            <tr>
              <th>Sản phẩm</th>
              <th>Biến thể</th>
              <th>Quà tặng</th>
              <th>Số lượng</th>
              <th>Giá</th>
              <th>Giảm giá voucher</th>
              <th>Thành tiền</th>
              <th class="text-center">Thao tác</th>
            </tr>
          </ng-template>

          <ng-template pTemplate="body" let-row let-i="rowIndex">
            <tr [formGroupName]="i">

              <td>
                <p-select
                  formControlName="sanPhamId"
                  [options]="sanPhamOptions"
                  optionLabel="label"
                  optionValue="value"
                  placeholder="Chọn sản phẩm"
                  fluid>
                </p-select>
              </td>
              <td>
                <input
                  pInputText
                  formControlName="sanPhamBienThe"
                  placeholder="Biến thể"
                  fluid />
              </td>

              <td>
                <input
                  pInputText
                  formControlName="quaTang"
                  placeholder="Quà tặng"
                  fluid />
              </td>

              <td>
                <p-inputNumber
                  formControlName="soLuong"
                  [min]="1"
                  (onInput)="calculateTotal()"
                  fluid>
                </p-inputNumber>
              </td>

              <td>
                <p-inputNumber
                  formControlName="gia"
                  [min]="0"
                  (onInput)="calculateTotal()"
                  fluid>
                </p-inputNumber>
              </td>

              <td>
                <p-inputNumber
                  formControlName="giamGiaVoucher"
                  [min]="0"
                  (onInput)="calculateTotal()"
                  fluid>
                </p-inputNumber>
              </td>

              <td>
                {{ getThanhTien(row) | number:'1.0-0' }}
              </td>

              <td class="text-center">
                <p-button
                  icon="pi pi-trash"
                  severity="danger"
                  (onClick)="removeRow(i)">
                </p-button>
              </td>

            </tr>
          </ng-template>

          <ng-template pTemplate="footer">
            <p-button
              label="Thêm dòng"
              icon="pi pi-plus"
              (onClick)="addRow()"
              class="mt-3">
            </p-button>
          </ng-template>

        </p-table>
      </div>
      <div>
        <label class="block font-bold mb-2">Ghi chú</label>
        <textarea
          pInputTextarea
          formControlName="ghiChu"
          rows="3"
          fluid>
        </textarea>
      </div>

      <!-- TỔNG TIỀN -->
      <div class="mt-4">
        <label class="block font-bold mb-2">Tổng tiền</label>
        <p-inputNumber
          formControlName="tongTien"
          mode="currency"
          currency="VND"
          locale="vi-VN"
          [readonly]="true"
          fluid>
        </p-inputNumber>
      </div>

    </div>

    <!-- FOOTER -->
    <ng-template pTemplate="footer">
      <p-toolbar>
        <ng-template pTemplate="end">
          <p-button
            label="Hủy"
            icon="pi pi-times"
            severity="secondary"
            class="mr-2"
            (onClick)="cancel()">
          </p-button>

          <p-button
            type="submit"
            label="Lưu lại"
            icon="pi pi-check"
            [disabled]="form.invalid || btnDisabled"
            [loading]="btnDisabled">
          </p-button>
        </ng-template>
      </p-toolbar>
    </ng-template>

    <p-blockUI [blocked]="blockedPanel" [target]="pnl">
      <p-progressSpinner style="top:37%" />
    </p-blockUI>

  </p-panel>
</form>

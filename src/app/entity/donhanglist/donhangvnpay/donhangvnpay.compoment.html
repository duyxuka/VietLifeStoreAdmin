<p-panel header="Danh sách đơn hàng VNPAY" #dt>

  <!-- SEARCH -->
  <p-toolbar class="mb-4">
    <ng-template #start></ng-template>

    <ng-template #end>
      <p-iconfield iconPosition="left">
        <p-inputicon styleClass="pi pi-search" />
        <input
          pInputText
          type="text"
          [(ngModel)]="keyword"
          (keyup.enter)="loadData()"
          placeholder="Tìm kiếm mã thanh toán"
          class="w-full"/>
      </p-iconfield>

      <p-button
        icon="pi pi-search"
        severity="secondary"
        class="ml-2"
        (onClick)="loadData()"/>
    </ng-template>
  </p-toolbar>

  <!-- TABLE -->
  <p-table
    [value]="items"
    dataKey="id"
    [rowHover]="true">

    <ng-template #header>
      <tr>
        <th>Mã thanh toán</th>
        <th>Mã giao dịch</th>
        <th>Số tiền</th>
        <th>Thông tin</th>
        <th>Trạng thái</th>
        <th>Ngày tạo</th>
      </tr>
    </ng-template>

    <ng-template #body let-row>
      <tr>
        <td>{{ row.paymentCode }}</td>
        <td>{{ row.transactionId }}</td>
        <td>{{ row.amount | number:'1.0-0' }}đ</td>
        <td>{{ row.paymentInfor }}</td>
        <td>
        <p-tag
            [value]="getPaymentStatusLabel(row.status)"
            [severity]="getPaymentStatusSeverity(row.status)">
        </p-tag>
        </td>
        <td>{{ row.createdDate | date:'dd-MM-yyyy hh:mm:ss a' }}</td>
      </tr>
    </ng-template>

  </p-table>

  <!-- PAGINATION -->
  <p-paginator
    [rows]="maxResultCount"
    [totalRecords]="totalCount"
    (onPageChange)="pageChanged($event)"
    [rowsPerPageOptions]="[10,20,30,50]"
    [showPageLinks]="true"
    [showCurrentPageReport]="true"/>

  <p-blockUI [blocked]="blockedPanel" [target]="dt">
    <p-progressSpinner style="top: 37%;" />
  </p-blockUI>

</p-panel>

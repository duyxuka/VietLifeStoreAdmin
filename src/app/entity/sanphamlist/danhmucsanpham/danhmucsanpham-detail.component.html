<form [formGroup]="form" (ngSubmit)="saveChange()" skipValidation>
  <p-panel #pnl header="Chi tiết danh mục sản phẩm">

    <ng-template pTemplate="body">
      <div class="flex flex-col gap-6 mt-4">

        <!-- Tên danh mục -->
        <div>
          <label class="font-bold mb-2 block">
            Tên danh mục <span class="text-red-500">*</span>
          </label>
          <input
            pInputText
            formControlName="ten"
            placeholder="Nhập tên danh mục"
            fluid />
          <app-validation-message
            [entityForm]="form"
            fieldName="ten"
            [validationMessages]="validationMessages" />
        </div>

        <!-- Slug -->
        <div>
          <label class="font-bold mb-2 block">Slug</label>
          <input
            pInputText
            formControlName="slug"
            placeholder="tu-dong-hoac-tu-nhap"
            fluid />
        </div>

        <!-- ✅ Thumbnail -->
        <div>
          <label class="font-bold mb-2 block">Ảnh thumbnail</label>
          <p-fileUpload
            mode="basic"
            name="thumbnail"
            accept="image/*"
            chooseLabel="Chọn thumbnail"
            [auto]="false"
            [customUpload]="true"
            (onSelect)="onThumbnailSelect($event)"
            [maxFileSize]="307200"
            class="w-full">
          </p-fileUpload>

          @if (thumbnailPreview) {
            <img
              [src]="thumbnailPreview"
              class="mt-3 border rounded w-64"
              alt="Thumbnail preview" />
          }
        </div>
        
        <!-- ✅ Banner -->
        <div>
          <label class="font-bold mb-2 block">Ảnh banner</label>
          <p-fileUpload
            mode="basic"
            name="banner"
            accept="image/*"
            chooseLabel="Chọn banner"
            [auto]="false"
            [customUpload]="true"
            (onSelect)="onBannerSelect($event)"
            [maxFileSize]="307200"
            class="w-full">
          </p-fileUpload>

          @if (bannerPreview) {
            <img
              [src]="bannerPreview"
              class="mt-3 border rounded w-full max-w-2xl"
              alt="Banner preview" />
          }
        </div>

        <!-- SEO -->
        <div>
          <label class="font-bold mb-2 block">Title SEO</label>
          <input pInputText formControlName="titleSEO" fluid />
        </div>

        <div>
          <label class="font-bold mb-2 block">Keyword</label>
          <input pInputText formControlName="keyword" fluid />
        </div>

        <div>
          <label class="font-bold mb-2 block">Description SEO</label>
          <textarea 
            pInputTextarea 
            formControlName="descriptionSEO"
            rows="3"
            fluid>
          </textarea>
        </div>

        <!-- Trạng thái -->
        <div class="flex items-center gap-3">
          <label class="font-bold">Trạng thái</label>
          <p-toggleswitch formControlName="trangThai"></p-toggleswitch>
        </div>

      </div>
    </ng-template>

    <!-- Footer -->
    <ng-template pTemplate="footer">
      <p-toolbar>
        <ng-template pTemplate="end">
          <p-button
            label="Hủy"
            icon="pi pi-times"
            severity="secondary"
            [outlined]="true"
            (onClick)="cancel()" 
            class="mr-2"/>
          <p-button
            type="submit"
            label="Lưu lại"
            icon="pi pi-check"
            [disabled]="!form.valid || btnDisabled"
            [loading]="btnDisabled" />
        </ng-template>
      </p-toolbar>
    </ng-template>

    <p-blockui [blocked]="blockedPanel" [target]="pnl">
      <p-progress-spinner />
    </p-blockui>

  </p-panel>
</form>
